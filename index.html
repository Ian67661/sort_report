<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排序演算法教學入口</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            line-height: 1.8; 
            padding: 40px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            color: #333;
        }
        h1 { 
            color: #fff; 
            margin-bottom: 40px; 
            text-align: center;
            font-size: 3em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            animation: fadeInUp 1s ease-out;
        }
        .menu-container { 
            display: flex; 
            gap: 30px; 
            flex-wrap: wrap; 
            justify-content: center; 
            max-width: 1200px;
        }
        .menu-card { 
            background: rgba(255, 255, 255, 0.95); 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            width: 300px; 
            text-align: center; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }
        .menu-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        .menu-card:hover::before {
            left: 100%;
        }
        .menu-card:hover { 
            transform: translateY(-10px) scale(1.05); 
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .menu-card h2 { 
            color: #2c3e50; 
            margin-top: 0; 
            font-size: 1.6em;
            margin-bottom: 15px;
        }
        .menu-card p { 
            color: #7f8c8d; 
            font-size: 1em; 
            line-height: 1.6;
            margin-bottom: 25px;
        }
        .btn { 
            display: inline-block; 
            padding: 15px 30px; 
            background: linear-gradient(135deg, #3498db, #2980b9); 
            color: white; 
            text-decoration: none; 
            border-radius: 50px; 
            font-weight: bold;
            font-size: 1.1em;
            transition: all 0.3s ease;
            box-shadow: 0 8px 15px rgba(52, 152, 219, 0.3);
            position: relative;
            overflow: hidden;
        }
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #2980b9, #3498db);
            transition: left 0.4s;
        }
        .btn:hover::before {
            left: 0;
        }
        .btn:hover { 
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(52, 152, 219, 0.4);
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .menu-card:nth-child(1) { animation: fadeInUp 0.5s ease-out 0.1s both; }
        .menu-card:nth-child(2) { animation: fadeInUp 0.5s ease-out 0.2s both; }
        .menu-card:nth-child(3) { animation: fadeInUp 0.5s ease-out 0.3s both; }
    </style>
</head>
<body>
    <h1>排序演算法教學</h1>
    <div class="menu-container">
        <div class="menu-card">
            <h2>氣泡排序法</h2>
            <p>最基本的交換排序，透過相鄰比較將元素歸位。</p>
            <a href="bubble_sort.html" class="btn">進入教學</a>
        </div>
        <div class="menu-card">
            <h2>選擇排序法</h2>
            <p>每次找出最小值放置到已排序區域的末端。</p>
            <a href="selection_sort.html" class="btn">進入教學</a>
        </div>
        <div class="menu-card">
            <h2>插入排序法</h2>
            <p>將元素逐步插入到已排序序列的適當位置。</p>
            <a href="insertion_sort.html" class="btn">進入教學</a>
        </div>
    </div>
</body>
</html>
