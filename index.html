<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排序演算法教學入口</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            line-height: 1.8; 
            padding: 40px;
            background: #667eea; 
            overflow-x: hidden;
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            color: #333;
        }
        /* 動態背景容器 */
        .bg-glow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        /* 光暈氣泡基礎樣式 */
        .glow-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.5;
            animation: blob-float 20s infinite alternate cubic-bezier(0.45, 0, 0.55, 1);
        }
        .blob-1 {
            width: 500px;
            height: 500px;
            background: rgba(52, 152, 219, 0.6); /* 亮藍色 */
            top: -10%;
            left: -10%;
        }
        .blob-2 {
            width: 600px;
            height: 600px;
            background: rgba(240, 147, 251, 0.5); /* 淺紫色 */
            bottom: -10%;
            right: -10%;
            animation-duration: 25s;
            animation-delay: -5s;
        }
        .blob-3 {
            width: 400px;
            height: 400px;
            background: rgba(118, 75, 162, 0.6); /* 深紫色 */
            top: 30%;
            left: 40%;
            animation-duration: 30s;
            animation-delay: -10s;
        }
        @keyframes blob-float {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(50px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 50px) scale(0.9); }
            100% { transform: translate(0, 0) scale(1); }
        }
        h1 { 
            color: #fff; 
            margin-bottom: 40px; 
            text-align: center;
            font-size: 3em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            animation: fadeInUp 1s ease-out;
        }
        .menu-container { 
            display: flex; 
            gap: 30px; 
            flex-wrap: wrap; 
            justify-content: center; 
            max-width: 1200px;
            perspective: 1000px; /* 增加透視感 */
        }
        .menu-card { 
            background: rgba(255, 255, 255, 0.15); /* 極致透明度 */
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2); 
            width: 300px; 
            text-align: center; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(15px); /* 增強磨砂感 */
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3); /* 亮色邊框 */
            position: relative;
            overflow: hidden;
            transform-style: preserve-3d;
        }
        .menu-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.6s ease;
        }
        .menu-card:hover::before {
            left: 100%;
        }
        .menu-card:hover { 
            transform: translateY(-20px) rotateX(5deg) scale(1.05); /* 3D 傾斜與位移 */
            box-shadow: 0 25px 50px rgba(0,0,0,0.4), 0 0 20px rgba(255,255,255,0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }
        .menu-card h2 { 
            color: #fff; /* 改為白色以配合透明背景 */
            margin-top: 0; 
            font-size: 1.6em;
            margin-bottom: 15px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        .menu-card p { 
            color: rgba(255, 255, 255, 0.85); /* 淺灰色文字 */
            font-size: 1em; 
            line-height: 1.6;
            margin-bottom: 25px;
        }
        .btn { 
            display: inline-block; 
            padding: 15px 30px; 
            background: linear-gradient(135deg, #3498db, #2980b9); 
            color: white; 
            text-decoration: none; 
            border-radius: 50px; 
            font-weight: bold;
            font-size: 1.1em;
            transition: all 0.3s ease;
            box-shadow: 0 8px 15px rgba(52, 152, 219, 0.3);
            position: relative;
            overflow: hidden;
        }
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #2980b9, #3498db);
            transition: left 0.4s;
        }
        .btn:hover::before {
            left: 0;
        }
        .btn:hover { 
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(52, 152, 219, 0.4);
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .menu-card:nth-child(1) { animation: fadeInUp 0.5s ease-out 0.1s both; }
        .menu-card:nth-child(2) { animation: fadeInUp 0.5s ease-out 0.2s both; }
        .menu-card:nth-child(3) { animation: fadeInUp 0.5s ease-out 0.3s both; }
        .menu-card:nth-child(4) { animation: fadeInUp 0.5s ease-out 0.4s both; }
    </style>
</head>
<body>
    <!-- 背景動態光暈 -->
    <div class="bg-glow-container">
        <div class="glow-blob blob-1"></div>
        <div class="glow-blob blob-2"></div>
        <div class="glow-blob blob-3"></div>
    </div>
    <h1>排序演算法教學</h1>
    <div class="menu-container">
        <div class="menu-card">
            <h2>氣泡排序法</h2>
            <p>最基本的交換排序，透過相鄰比較將元素歸位。</p>
            <a href="bubble_sort.html" class="btn">進入教學</a>
        </div>
        <div class="menu-card">
            <h2>選擇排序法</h2>
            <p>每次找出最小值放置到已排序區域的末端。</p>
            <a href="selection_sort.html" class="btn">進入教學</a>
        </div>
        <div class="menu-card">
            <h2>插入排序法</h2>
            <p>將元素逐步插入到已排序序列的適當位置。</p>
            <a href="insertion_sort.html" class="btn">進入教學</a>
        </div>
        <div class="menu-card">
            <h2>合併排序法</h2>
            <p>使用分而治之法，將陣列拆解後再重新合併排序。</p>
            <a href="merge_sort.html" class="btn">進入教學</a>
        </div>
        <div class="menu-card">
            <h2>快速排序法</h2>
            <p>目前最高效的排序演算法之一，利用基準值進行快速分區。</p>
            <a href="quick_sort.html" class="btn">進入教學</a>
        </div>
    </div>
</body>
</html>
